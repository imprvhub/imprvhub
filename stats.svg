<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400" style="font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif;" data-color-mode="light dark"><style>
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .card { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.1)); }
        .bar { animation: slideIn 1s ease-out forwards; }
        .text { animation: fadeIn 0.5s ease-out forwards; }
        .language { font-size: 12px; }
        .percentage { font-size: 12px; opacity: 0.8; }

        @media (prefers-color-scheme: dark) {
            .card-bg { fill: #0d1117 !important; }
            .language, .percentage { fill: #ffffff !important; }
            .bar-color { fill: #4494F8 !important; }
        }

        @media (prefers-color-scheme: light) {
            .card-bg { fill: #ffffff !important; }
            .language, .percentage { fill: #24292f !important; }
            .bar-color { fill: #5E5E5E !important; }
        }
    </style><g class="card"><rect class="card-bg" x="0" y="0" width="300" height="400" rx="12" /></g><text x="55" y="25" class="text language" style="font-size: 18px; font-weight: 600;">Most Used Languages:</text><g transform="translate(0, 50)" style="animation-delay: 0.0s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.0s">Python</text><rect class="bar bar-color" x="55" y="15" width="81.9" height="10" rx="4" style="animation-delay: 0.0s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.0s">39.0%</text></g><g transform="translate(0, 90)" style="animation-delay: 0.1s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.1s">Vanilla JS/React.js</text><rect class="bar bar-color" x="55" y="15" width="64.89" height="10" rx="4" style="animation-delay: 0.1s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.1s">30.9%</text></g><g transform="translate(0, 130)" style="animation-delay: 0.2s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.2s">Astro</text><rect class="bar bar-color" x="55" y="15" width="15.329999999999998" height="10" rx="4" style="animation-delay: 0.2s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.2s">7.3%</text></g><g transform="translate(0, 170)" style="animation-delay: 0.30000000000000004s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.30000000000000004s">TypeScript</text><rect class="bar bar-color" x="55" y="15" width="13.65" height="10" rx="4" style="animation-delay: 0.30000000000000004s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.30000000000000004s">6.5%</text></g><g transform="translate(0, 210)" style="animation-delay: 0.4s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.4s">Shell</text><rect class="bar bar-color" x="55" y="15" width="10.290000000000001" height="10" rx="4" style="animation-delay: 0.4s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.4s">4.9%</text></g><g transform="translate(0, 250)" style="animation-delay: 0.5s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.5s">C</text><rect class="bar bar-color" x="55" y="15" width="8.61" height="10" rx="4" style="animation-delay: 0.5s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.5s">4.1%</text></g><g transform="translate(0, 290)" style="animation-delay: 0.6000000000000001s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.6000000000000001s">Dockerfile</text><rect class="bar bar-color" x="55" y="15" width="8.61" height="10" rx="4" style="animation-delay: 0.6000000000000001s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.6000000000000001s">4.1%</text></g><g transform="translate(0, 330)" style="animation-delay: 0.7000000000000001s"><text class="text language" x="55" y="0" dominant-baseline="middle" style="animation-delay: 0.7000000000000001s">Java</text><rect class="bar bar-color" x="55" y="15" width="6.72" height="10" rx="4" style="animation-delay: 0.7000000000000001s" /><text class="text percentage" x="245" y="22.0" text-anchor="end" dominant-baseline="middle" style="animation-delay: 0.7000000000000001s">3.2%</text></g></svg>